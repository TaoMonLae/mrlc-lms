<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Offline — MRLC LMS</title>
    <style>
      :root { color-scheme: light dark; }
      * { box-sizing: border-box; }
      body {
        margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
        font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: #f8fafc; color: #0f172a; padding: 24px; text-align: center;
      }
      .card { max-width: 420px; }
      .logo {
        width: 72px; height: 72px; border-radius: 18px; background: #5865f2;
        display: flex; align-items: center; justify-content: center; margin: 0 auto 20px;
      }
      h1 { font-size: 1.4rem; margin: 0 0 8px; }
      p { color: #64748b; line-height: 1.5; margin: 0 0 20px; }
      button {
        border: 0; background: #5865f2; color: #fff; font-weight: 600; font-size: 0.95rem;
        padding: 12px 20px; border-radius: 10px; cursor: pointer;
      }
      button:hover { background: #4752e0; }
      @media (prefers-color-scheme: dark) {
        body { background: #0a0d3a; color: #f8fafc; }
        p { color: #94a3b8; }
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="logo">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 10v6M2 10l10-5 10 5-10 5z" /><path d="M6 12v5c3 3 9 3 12 0v-5" />
        </svg>
      </div>
      <h1>You're offline</h1>
      <p>This page needs an internet connection. Already-opened pages still work offline — reconnect to load new data.</p>
      <button onclick="location.reload()">Try again</button>
    </div>
  </body>
</html>
