services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mrlc}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mrlc_password}
      POSTGRES_DB: ${POSTGRES_DB:-school_lms}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mrlc} -d ${POSTGRES_DB:-school_lms}"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      # Use the compose service name "db" as the host.
      DATABASE_URL: "postgresql://${POSTGRES_USER:-mrlc}:${POSTGRES_PASSWORD:-mrlc_password}@db:5432/${POSTGRES_DB:-school_lms}"
      SESSION_SECRET: "${SESSION_SECRET:-change-me-to-a-long-random-string}"
      APP_URL: "${APP_URL:-http://localhost:8000}"
      PORT: "8000"
      NODE_ENV: "production"
      # Set to "true" on first run to create the starter accounts, then remove.
      SEED_ON_START: "${SEED_ON_START:-false}"
      # Where uploaded e-books are stored (mounted as a persistent volume below).
      EBOOK_DIR: "/app/data/ebooks"
      # Where database backups are written (persistent volume below).
      BACKUP_DIR: "/app/data/backups"
      # How many daily backups to keep (older ones are pruned).
      BACKUP_RETENTION: "${BACKUP_RETENTION:-14}"
    volumes:
      # Persist uploaded e-book files across container rebuilds/recreations.
      - ebook_data:/app/data/ebooks
      # Persist database backups.
      - backup_data:/app/data/backups
    ports:
      - "8000:8000"

volumes:
  db_data:
  ebook_data:
  backup_data:
