# Docker Production .env Template
# Copy this file to .env and update with your production values

# ── Database ────────────────────────────────────────────────────────────────────────
# PostgreSQL connection string for Docker (uses 'db' service name)
POSTGRES_USER=mrlc
POSTGRES_PASSWORD=<CHANGE_THIS_TO_STRONG_PASSWORD>
POSTGRES_DB=school_lms
DATABASE_URL="postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}"

# ── Application ─────────────────────────────────────────────────────────────────────
APP_URL=https://gedmrlc.monrefugeelc.com
PORT=8000
NODE_ENV=production

# ── Security ────────────────────────────────────────────────────────────────────────
# JWT secret - MUST be a long, random string (>= 16 chars)
# Generate with: openssl rand -base64 48
SESSION_SECRET=<CHANGE_THIS_TO_LONG_RANDOM_STRING>

# ── Storage ────────────────────────────────────────────────────────────────────────
# E-book storage (mounted as Docker volume)
EBOOK_DIR=/app/data/ebooks
# Database backups (mounted as Docker volume)
BACKUP_DIR=/app/data/backups
# Number of backups to retain
BACKUP_RETENTION=14
# Hour for daily backup (0-23, default 2AM)
BACKUP_HOUR=2

# ── Initial Seed (Optional) ───────────────────────────────────────────────────────
# Set to "true" only on first run to create starter accounts, then remove or set to "false"
SEED_ON_START=false

# Optional: Set specific passwords for seed accounts
# If unset, demo defaults are used and password change is forced on first login
# SEED_ADMIN_PASSWORD=
# SEED_TEACHER_PASSWORD=
# SEED_STUDENT_PASSWORD=
